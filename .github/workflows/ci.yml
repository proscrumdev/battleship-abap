name: CI

on: [push, pull_request]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Lint (abaplint)
        run: npm run lint

      - name: Transpile ABAP to JavaScript
        run: npm run build

      - name: ABAP Unit tests
        run: node run-abapunit.mjs

      - name: Cucumber tests
        run: ./node_modules/.bin/cucumber-js --format junit:testresults_cucumber.xml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: testresults_*.xml
